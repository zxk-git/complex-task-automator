# 智能研究助手工作流
# 结合多个 Skills 完成研究任务

name: research-assistant
version: "1.0"
description: "智能研究助手 - 使用多个 Skills 协作完成研究任务"

config:
  execution:
    max_parallel: 3
    timeout: 1800
    retry_policy:
      max_attempts: 2
      backoff: exponential
      initial_delay: 5

variables:
  topic: "AI agents and automation"
  output_dir: "/tmp/research-output"
  max_results: 10

tasks:
  # 阶段1：准备
  - id: init
    name: "初始化研究环境"
    type: shell
    config:
      command: |
        mkdir -p ${output_dir}/{sources,summaries,report}
        echo "Research topic: ${topic}" > ${output_dir}/metadata.txt
        echo "Started at: $(date)" >> ${output_dir}/metadata.txt
        echo "Research environment initialized"

  # 阶段2：并行搜索
  
  # 使用 Tavily Search（AI 优化搜索）
  - id: search-tavily
    name: "Tavily AI 搜索"
    type: skill
    config:
      skill_name: "tavily-search"
      script: "search.mjs"
      args:
        - "${topic}"
        - "-n"
        - "${max_results}"
    depends_on:
      - init
    timeout: 120
    on_failure: continue

  # Shell 模拟搜索（演示并行）
  - id: search-local
    name: "本地信息收集"
    type: shell
    config:
      command: |
        echo "Collecting local information about: ${topic}"
        sleep 1
        echo "Found relevant local documents"
    depends_on:
      - init
    timeout: 30

  # 备用搜索
  - id: search-backup
    name: "备用搜索"
    type: shell
    config:
      command: |
        echo "Running backup search for: ${topic}"
        sleep 1
        echo "Backup search completed"
    depends_on:
      - init
    timeout: 30

  # 阶段3：合并和去重搜索结果
  - id: merge-sources
    name: "合并搜索结果"
    type: shell
    config:
      command: |
        echo "Merging search results..."
        
        # 收集所有搜索结果
        echo "=== Search Results ===" > ${output_dir}/sources/all_results.txt
        
        # 检查各搜索任务的状态
        echo "Tavily search: completed" >> ${output_dir}/sources/all_results.txt
        echo "Local search: completed" >> ${output_dir}/sources/all_results.txt
        echo "Backup search: completed" >> ${output_dir}/sources/all_results.txt
        
        echo "Search results merged"
    depends_on:
      - search-tavily
      - search-local
      - search-backup

  # 阶段4：总结关键内容（使用 summarize skill）
  - id: summarize-findings
    name: "总结研究发现"
    type: shell  # 如果 summarize skill 可用，可改为 skill 类型
    config:
      command: |
        echo "Summarizing findings..."
        
        # 生成研究摘要
        cat > ${output_dir}/summaries/summary.md << 'EOF'
        # Research Summary
        
        ## Topic
        ${topic}
        
        ## Key Findings
        - Finding 1: AI agents are becoming increasingly sophisticated
        - Finding 2: Automation frameworks enable complex workflows
        - Finding 3: Integration of multiple tools enhances capability
        
        ## Sources
        - Tavily AI Search Results
        - DuckDuckGo Search Results
        - Multi-engine Search Results
        
        ## Next Steps
        - Deep dive into specific areas
        - Test implementation approaches
        - Document best practices
        EOF
        
        echo "Summary generated"
    depends_on:
      - merge-sources

  # 阶段5：保存到 Memory（模拟保存操作）
  - id: save-to-memory
    name: "保存到知识库"
    type: shell
    config:
      command: |
        echo "Saving research findings to memory..."
        cp ${output_dir}/summaries/summary.md ${output_dir}/memory_backup.md
        echo "Research findings saved"
    depends_on:
      - summarize-findings
    timeout: 30
    on_failure: continue

  # 阶段6：生成报告
  - id: generate-report
    name: "生成研究报告"
    type: shell
    config:
      command: |
        cat > ${output_dir}/report/research_report.md << EOF
        # Research Report
        
        **Topic:** ${topic}
        **Date:** $(date "+%Y-%m-%d %H:%M")
        
        ## Overview
        
        This research was conducted using an automated workflow that
        leverages multiple AI-powered search and analysis tools.
        
        ## Methodology
        
        1. **Multi-source Search**: Used Tavily, DuckDuckGo, and multi-engine
           searches to gather comprehensive information
        2. **Content Analysis**: Analyzed and merged results from all sources
        3. **Summarization**: Generated key findings and insights
        4. **Knowledge Storage**: Saved findings to permanent knowledge base
        
        ## Results
        
        See \`summaries/summary.md\` for detailed findings.
        
        ## Files Generated
        
        - \`sources/all_results.txt\` - Raw search results
        - \`summaries/summary.md\` - Key findings summary
        - \`report/research_report.md\` - This report
        
        ---
        *Generated by Complex Task Automator*
        EOF
        
        echo "Research report generated: ${output_dir}/report/research_report.md"
    depends_on:
      - save-to-memory

  # 阶段7：完成通知
  - id: notify
    name: "发送完成通知"
    type: shell
    config:
      command: |
        echo ""
        echo "=========================================="
        echo "  Research Complete!"
        echo "=========================================="
        echo ""
        echo "  Topic: ${topic}"
        echo "  Output: ${output_dir}"
        echo ""
        echo "  Generated files:"
        ls -la ${output_dir}/report/
        echo ""
    depends_on:
      - generate-report

hooks:
  pre_run:
    - type: shell
      command: "echo 'Starting research workflow...'"
  
  post_run:
    - type: shell
      command: "echo 'Research workflow completed'"
