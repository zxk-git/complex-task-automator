# =========================================================
#  OpenClaw Tutorial Auto — 24/7 批量调度工作流
# =========================================================
#  专为 OpenClaw Cron 定时调度设计的轻量工作流
#  调用 daemon.py 统一入口, 自动：
#    1. 健康检查 → 2. 批量生成 N 个章节 → 3. 健康检查
#  全部完成后自动停止
# =========================================================

name: openclaw-tutorial-batch-scheduler
version: "1.0"
description: "24/7 定时批量生成教程章节（供 OpenClaw Cron 调用）"

variables:
  PROJECT_DIR: /root/.openclaw/workspace/zxk-private/openclaw-tutorial-auto
  OUTPUT_DIR: /tmp/openclaw-tutorial-auto-reports
  SCRIPTS_DIR: /root/.openclaw/workspace/skills/complex-task-automator/workflows/openclaw-tutorial-auto/scripts
  MAX_CHAPTERS: "3"
  COOLDOWN: "30"
  DRY_RUN: "false"

config:
  execution:
    max_parallel: 1
    timeout: 1800             # 30分钟总超时
  schedule:
    type: cron
    cron: "0 */4 * * *"       # 每4小时
    timezone: "Asia/Shanghai"
  batch:
    stop_on_complete: true

tasks:
  # ── 唯一 Task：调用 daemon.py full 模式 ──
  - id: daemon-full
    name: "24/7 调度器 (健康检查 + 批量生成)"
    type: python
    config:
      script: "${SCRIPTS_DIR}/daemon.py"
      args: ["--mode", "full", "--max-chapters", "${MAX_CHAPTERS}", "--cooldown", "${COOLDOWN}"]
      env:
        PROJECT_DIR: "${PROJECT_DIR}"
        OUTPUT_DIR: "${OUTPUT_DIR}"
        SCRIPTS_DIR: "${SCRIPTS_DIR}"
        MAX_CHAPTERS_PER_RUN: "${MAX_CHAPTERS}"
        COOLDOWN_SECONDS: "${COOLDOWN}"
        DRY_RUN: "${DRY_RUN}"
    timeout: 1800
    retry:
      max_attempts: 2
      backoff: fixed
      initial_delay: 60
    on_failure: continue
