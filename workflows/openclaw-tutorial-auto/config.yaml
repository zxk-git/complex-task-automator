# =========================================================
# openclaw-tutorial-auto ─ 项目自动化统一配置
# =========================================================
# 所有脚本通过 utils.cfg() 读取本文件作为唯一参数来源。
# 环境变量优先级高于此文件。
# =========================================================

# ── 路径 ─────────────────────────────────────────────
project_dir: /root/.openclaw/workspace/zxk-private/openclaw-tutorial-auto
output_dir: /tmp/openclaw-tutorial-auto-reports
outline_file: OUTLINE.md
encoding: utf-8

# ── 章节 ─────────────────────────────────────────────
expected_chapters: 21

# ── 目录发现 (discover 阶段) ─────────────────────────
discover:
  # 额外扫描的子目录 (除项目根目录外)
  extra_dirs:
    - docs
    - tutorial
    - tutorials
    - guide
    - guides
    - chapters
  # 排除的目录
  exclude_dirs:
    - node_modules
    - __pycache__
    - .git
    - assets
    - images
    - _archive
    - .cache
    - drafts

# ── README 自动生成 (update_readme 阶段) ───────────
readme:
  auto_update: true                 # 优化完成后自动更新 README
  backup_old: true                  # 更新前备份旧 README
  include_quality_stats: true       # 包含质量统计
  include_learning_path: true       # 包含推荐学习路径

# ── 扫描增强 (v5.2) ────────────────────────────────
scan:
  code_block_aware: true            # 代码块感知: 跳过代码块内的 # 注释
  dense_block_threshold: 25         # 密排阈值 (连续行数)

# ── 自动修复 (fix_issues 阶段, v5.2) ───────────────
fix_issues:
  auto_fix_links: true              # 自动修复内部断链 (3 策略)
  auto_fix_consistency: true        # 自动修复术语/URL 不一致
  protect_code_blocks: true         # 修复时保护代码块内容

# ── 精炼操作开关 (v5.2) ────────────────────────────
refine:
  operations:
    fix_code_closings: true         # P0: 修复损坏的代码块关闭
    clean_scrape_artifacts: true    # P1: 清洗爬虫残留
    deduplicate_sections: true      # P1: 去重段落
    convert_github_alerts: true     # P1: Alert 语法统一
    fix_heading_jumps: true         # 修复标题跳级
    add_navigation: true            # 添加章首/章尾导航
    add_badges: true                # shields.io 徽章
    add_toc: true                   # 添加本章目录
    add_code_labels: true           # 代码块语言标注
    add_faq: true                   # 添加 FAQ
    add_summary: true               # 添加本章小结
    add_references: true            # 添加参考来源
    fix_cjk_spacing: true           # 中英文间距
    fix_dense_blocks: true          # 密排修复

# ── 质量检查 (六维度评分 v2) ─────────────────────────
quality:
  min_words_per_chapter: 1200        # 单章最低字数
  min_sections_per_chapter: 3       # 最少 H2 小节数
  max_heading_depth: 4              # 最大标题嵌套层级
  require_code_blocks: true
  require_summary: true
  pass_score: 75                    # 合格分数线 (B 级)
  # 六维度权重 (合计100)
  weights:
    content_depth: 25               # D1: 内容深度
    structure: 20                   # D2: 结构完整性
    code_quality: 15                # D3: 代码质量
    pedagogy: 15                    # D4: 教学价值
    references: 10                  # D5: 参考来源
    readability: 15                 # D6: 可读性
  # 缺陷惩罚（按严重程度）
  defect_penalties:
    critical: 5                     # placeholder
    major: 3                        # heading_jump, dense_block
    minor: 1                        # unlabeled_code_block, short_section
  # 等级划分
  grade_thresholds:
    A: 90
    B: 75
    C: 60
    D: 40
    # < 40 = F

# ── 批量生成 (batch_runner.py) ────────────────────────
batch:
  max_chapters_per_run: 3
  cooldown_seconds: 30
  max_consecutive_failures: 3

# ── 持续优化 (optimize_chapter.py) ───────────────────
optimize:
  min_interval_hours: 4             # 同一章节冷却期（配合每4h运行）
  max_chapters: 4                   # 每轮最多优化章节数
  history_max_entries: 500          # 优化历史最大条目数

# ── 搜索 (web_researcher.py) ─────────────────────────
search:
  tavily_script: /root/.openclaw/workspace/skills/tavily-search/scripts/search.mjs
  cache_max_days: 7                 # 缓存过期天数
  max_results_per_query: 5
  rate_limit_seconds: 1             # 搜索间隔
  # 搜索引擎启用（按优先级）: tavily > bing > brave > ddg > baidu
  engines:
    tavily: true
    bing: true
    brave: true
    ddg: true
    baidu: true                     # 中文内容补充

# ── 飞书通知 ─────────────────────────────────────────
feishu:
  chat_id: "chat:oc_d618ee5b611928489deeccc66535a1e6"
  account: "default"
  notify_on_optimize: true          # 优化后自动通知
  notify_on_error: true             # 错误时通知

# ── 通用多渠道通知 (modules/notifier.py) ──────────────
notify:
  channels:
    feishu:
      enabled: true                 # 复用上面 feishu 配置
    wecom:
      enabled: false
      # webhook_url: "https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=YOUR_KEY"
    dingtalk:
      enabled: false
      # webhook_url: "https://oapi.dingtalk.com/robot/send?access_token=YOUR_TOKEN"
      # secret: "SECxxx"
    slack:
      enabled: false
      # webhook_url: "https://hooks.slack.com/services/xxx/yyy/zzz"
    webhook:
      enabled: false
      # webhook_url: "https://your-api.example.com/webhook"
      # headers:
      #   Authorization: "Bearer YOUR_TOKEN"

# ── Git ──────────────────────────────────────────────
git:
  auto_commit: true
  branch: main
  remote_url: "https://github.com/zxk-git/openclaw-tutorial-auto.git"
  remote_name: zxk                  # git remote 名称
  safe_patterns:                    # 允许自动提交的文件模式
    - ".*\\.md$"
    - ".*\\.gitignore$"
    - ".*\\.json$"

# ── 健康检查 (health_check.py) ───────────────────────
health:
  max_hours_no_progress: 24
  max_consecutive_failures: 3

# ── 任务执行 ─────────────────────────────────────────
execution:
  max_parallel: 4
  timeout: 300
  retry_on_fail: true
  max_retries: 2

# ── 报告 ─────────────────────────────────────────────
report:
  format: markdown
  include_file_tree: true
  include_quality_details: true
  include_suggestions: true
  include_next_steps: true

# ── 日志 ─────────────────────────────────────────────
# ── 引用增强 (suggestion_enricher.py) ─────────────
enricher:
  web_search_in_dry_run: false       # dry-run 模式是否启用 Web 搜索
  max_refs_per_suggestion: 3         # 每条建议最多引用数
  cache_max_days: 7                  # Web 搜索缓存过期天数
  static_refs_only: false            # 仅使用静态引用（不搜索）

# ── AI 精炼 (modules/ai_refiner.py) ──────────────────
ai_refiner:
  agent: "coding"                    # OpenClaw agent ID
  thinking: "medium"                 # off / minimal / low / medium / high
  timeout: 120                       # 单次调用超时秒数
  max_content_length: 12000          # 最大输入内容长度 (字符)
  auto_on_low_score: true            # 自动对低分章节启用 AI 精炼
  score_threshold: 75                # 低于此分触发 AI 精炼

log_level: INFO

# ── 代码优化模式 ──────────────────────────────────────
code:
  default_extensions:
    - .py
    - .js
    - .ts
    - .sh
    - .go
    - .rs
    - .c
    - .h
    - .cpp
    - .hpp
    - .java
  ignore_dirs:
    - node_modules
    - __pycache__
    - .git
    - .venv
    - dist
    - build
  quality:
    pass_score: 75
    weights:
      structure: 20
      documentation: 20
      complexity: 20
      style: 20
      practices: 20
  refine:
    max_files_per_run: 20
    auto_fix:
      docstrings: true
      imports: true
      trailing_whitespace: true
      main_guard: true
